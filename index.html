<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CardioPlus Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDOECJizIo7TtDn832EVBgDF4pnrAsq2v8",
            authDomain: "cardioplus-booking.firebaseapp.com",
            projectId: "cardioplus-booking",
            storageBucket: "cardioplus-booking.firebasestorage.app",
            messagingSenderId: "140447979267",
            appId: "1:140447979267:web:cdd8feebd1d372f43abb36" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ตัวแปรเก็บข้อมูลทั้งหมดจากฐานข้อมูล
        let allAppointments = [];

        // ฟังก์ชันอัปเดตสถานะคิว
        window.updateStatus = async (id, newStatus) => {
            if(confirm(`ต้องการเปลี่ยนสถานะเป็น "${newStatus}" ใช่หรือไม่?`)) {
                const docRef = doc(db, "appointments", id);
                await updateDoc(docRef, { status: newStatus });
            }
        };

        // ฟังก์ชันสำหรับวาดตารางและกรองข้อมูล
        function renderTable() {
            const filterValue = document.getElementById("filterStatus").value;
            const tbody = document.getElementById("bookingList");
            tbody.innerHTML = "";
            
            // กรองข้อมูลตามที่เลือกจาก Dropdown
            const filteredData = allAppointments.filter(data => {
                const status = data.status || 'รอยืนยัน';
                if (filterValue === 'active') {
                    return status === 'รอยืนยัน' || status === 'ยืนยันแล้ว';
                } else if (filterValue === 'history') {
                    return status === 'เสร็จสิ้น' || status === 'ยกเลิก';
                }
                return true; // กรณีเลือก 'all'
            });

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #888;">ไม่มีคิวนัดหมายในหมวดหมู่นี้</td></tr>`;
                return;
            }

            filteredData.forEach((data) => {
                const phone = data.phoneNumber || 'ไม่มีเบอร์โทร';
                const userId = data.userId || 'ไม่มีข้อมูล';
                const status = data.status || 'รอยืนยัน';
                const bDate = data.bookDate || '-';
                const bTime = data.bookTime || '-';
                
                let submitDate = "-";
                if(data.createdAt && data.createdAt.seconds) {
                    submitDate = new Date(data.createdAt.seconds * 1000).toLocaleDateString('th-TH');
                }

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong style="color: #4a4a4a; font-size: 16px;">${data.patientName}</strong><br>
                            <span style="font-size: 13px; color: #666;">📞 ${phone}</span><br>
                            <span style="font-size: 11px; color: #aaa;" title="${userId}">ID: ${userId.substring(0, 10)}...</span>
                        </td>
                        <td>
                            <span>${data.service}</span><br>
                            <span style="font-size: 11px; color: #aaa;">กดจองเมื่อ: ${submitDate}</span>
                        </td>
                        <td>
                            <strong>${bDate}</strong><br>
                            <span style="color: #8B7D7B;">เวลา ${bTime} น.</span>
                        </td>
                        <td><span class="status-${status}">${status}</span></td>
                        <td>
                            <div style="margin-bottom: 5px;">
                                <button onclick="updateStatus('${data.id}', 'ยืนยันแล้ว')">ยืนยัน</button>
                                <button class="btn-done" onclick="updateStatus('${data.id}', 'เสร็จสิ้น')">ตรวจเสร็จ</button>
                            </div>
                            <div>
                                <button class="btn-cancel" onclick="updateStatus('${data.id}', 'ยกเลิก')">ยกเลิกคิว</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // จับเหตุการณ์เมื่อเปลี่ยนตัวกรองให้โหลดตารางใหม่
        document.getElementById("filterStatus").addEventListener("change", renderTable);

        async function initAdmin() {
            await liff.init({ liffId: "2009872099-Lm3zmKkH" });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            // ดึงข้อมูลจาก Firebase ทันทีที่มีการเปลี่ยนแปลง
            const q = query(collection(db, "appointments"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                allAppointments = [];
                snapshot.forEach((doc) => {
                    allAppointments.push({ id: doc.id, ...doc.data() });
                });
                renderTable(); // สั่งให้วาดตารางใหม่ทุกครั้งที่ดึงข้อมูลเสร็จ
            });
        }
        
        initAdmin();
    </script>
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background: #FAF9F6; 
            padding: 20px; 
            margin: 0;
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
            overflow-x: auto; 
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #F0ECE3;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        h1 { color: #8c7a6b; font-size: 22px; margin: 0;}
        
        .filter-box select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-family: 'Prompt';
            font-size: 14px;
            outline: none;
        }

        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #F0ECE3; color: #8c7a6b; font-size: 15px; }
        td { padding: 12px; border-bottom: 1px solid #F0ECE3; font-size: 14px; vertical-align: top; }
        
        .status-รอยืนยัน { color: #E67E22; background: #FEF5E7; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        .status-ยืนยันแล้ว { color: #27AE60; background: #E9F7EF; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        .status-เสร็จสิ้น { color: #2980B9; background: #EAF2F8; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        .status-ยกเลิก { color: #C0392B; background: #FDEDEC; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        
        button { 
            background: #8c7a6b; color: white; border: none; padding: 6px 12px; 
            border-radius: 6px; cursor: pointer; font-family: 'Prompt'; font-size: 13px;
            transition: 0.3s;
        }
        button:hover { background: #6b5b4c; }
        
        .btn-done { background: #3498DB; margin-left: 5px; }
        .btn-done:hover { background: #2980B9; }
        
        .btn-cancel { background: #E0E0E0; color: #666; margin-top: 5px; width: 100%;}
        .btn-cancel:hover { background: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-container">
            <h1>🗓️ ระบบจัดการคิวนัดหมาย - CardioPlus</h1>
            
            <div class="filter-box">
                <label>📌 แสดงผล: </label>
                <select id="filterStatus">
                    <option value="active" selected>คิวปัจจุบัน (รอ / ยืนยัน)</option>
                    <option value="history">ประวัติย้อนหลัง (เสร็จสิ้น / ยกเลิก)</option>
                    <option value="all">ดูทั้งหมด</option>
                </select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ข้อมูลคนไข้</th>
                    <th>บริการที่จอง</th>
                    <th>วัน/เวลานัดหมาย</th>
                    <th>สถานะ</th>
                    <th style="width: 150px;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="bookingList">
                <tr><td colspan="5" style="text-align: center; color: #888;">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>
</body>
</html>
