<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CardioPlus Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, addDoc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDOECJizIo7TtDn832EVBgDF4pnrAsq2v8",
            authDomain: "cardioplus-booking.firebaseapp.com",
            projectId: "cardioplus-booking",
            storageBucket: "cardioplus-booking.firebasestorage.app",
            messagingSenderId: "140447979267",
            appId: "1:140447979267:web:cdd8feebd1d372f43abb36" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let allAppointments = [];
        let allClosedDates = [];

        // --- ส่วนจัดการภาพตารางแพทย์ ---
        async function loadScheduleImage() {
            try {
                const docRef = doc(db, "settings", "schedule");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().imageUrl) {
                    const imgEl = document.getElementById("currentScheduleImg");
                    imgEl.src = docSnap.data().imageUrl;
                    imgEl.style.display = "block";
                    document.getElementById("noImageText").style.display = "none";
                }
            } catch (error) {
                console.error("Error loading image:", error);
            }
        }

        window.uploadSchedule = async () => {
            const fileInput = document.getElementById("scheduleImage");
            const file = fileInput.files[0];
            if (!file) {
                alert("กรุณาเลือกไฟล์ภาพตารางออกตรวจก่อนครับ");
                return;
            }

            const uploadBtn = document.getElementById("uploadBtn");
            uploadBtn.innerText = "กำลังอัปโหลด...";
            uploadBtn.disabled = true;

            try {
                // อัปโหลดไฟล์ไปที่ Firebase Storage (เขียนทับไฟล์เดิมเสมอ)
                const storageRef = sRef(storage, 'schedules/current_schedule');
                await uploadBytes(storageRef, file);
                
                // ดึง URL ของภาพที่อัปโหลดเสร็จ
                const url = await getDownloadURL(storageRef);

                // บันทึก URL ลง Firestore เพื่อให้หน้าลูกค้าดึงไปโชว์
                await setDoc(doc(db, "settings", "schedule"), { imageUrl: url, updatedAt: new Date() });

                alert("อัปโหลดภาพตารางสำเร็จ!");
                loadScheduleImage();
                fileInput.value = "";
            } catch (error) {
                console.error("Upload error:", error);
                alert("เกิดข้อผิดพลาด! กรุณาตรวจสอบว่าเปิดสิทธิ์ Storage Rules แล้วหรือยัง");
            } finally {
                uploadBtn.innerText = "อัปโหลดภาพใหม่";
                uploadBtn.disabled = false;
            }
        };

        // --- ส่วนจัดการคิว (Appointments) ---
        window.updateStatus = async (id, newStatus) => {
            if(confirm(`ต้องการเปลี่ยนสถานะเป็น "${newStatus}" ใช่หรือไม่?`)) {
                const docRef = doc(db, "appointments", id);
                await updateDoc(docRef, { status: newStatus });
            }
        };

        function renderTable() {
            const filterValue = document.getElementById("filterStatus").value;
            const tbody = document.getElementById("bookingList");
            tbody.innerHTML = "";
            
            const filteredData = allAppointments.filter(data => {
                const status = data.status || 'รอยืนยัน';
                if (filterValue === 'active') {
                    return status === 'รอยืนยัน' || status === 'ยืนยันแล้ว';
                } else if (filterValue === 'history') {
                    return status === 'เสร็จสิ้น' || status === 'ยกเลิก';
                }
                return true; 
            });

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #888; padding: 20px;">ไม่มีคิวนัดหมายในหมวดหมู่นี้</td></tr>`;
                return;
            }

            filteredData.forEach((data) => {
                const phone = data.phoneNumber || '-';
                const userId = data.userId || '-';
                const status = data.status || 'รอยืนยัน';
                const bDate = data.bookDate || '-';
                const bTime = data.bookTime || '-';
                
                let submitDate = "-";
                if(data.createdAt && data.createdAt.seconds) {
                    submitDate = new Date(data.createdAt.seconds * 1000).toLocaleDateString('th-TH');
                }

                let displayDate = bDate;
                if(bDate !== '-') {
                    const [y, m, d] = bDate.split('-');
                    displayDate = `${d}/${m}/${y}`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong style="color: #4a4a4a; font-size: 16px;">${data.patientName}</strong><br>
                            <span style="font-size: 13px; color: #666;">📞 ${phone}</span><br>
                            <span style="font-size: 11px; color: #aaa;" title="${userId}">ID: ${userId.substring(0, 10)}...</span>
                        </td>
                        <td>
                            <span>${data.service}</span><br>
                            <span style="font-size: 11px; color: #aaa;">กดจองเมื่อ: ${submitDate}</span>
                        </td>
                        <td>
                            <strong>${displayDate}</strong><br>
                            <span style="color: #8B7D7B;">เวลา ${bTime} น.</span>
                        </td>
                        <td><span class="status-${status}">${status}</span></td>
                        <td>
                            <div style="margin-bottom: 5px;">
                                <button onclick="updateStatus('${data.id}', 'ยืนยันแล้ว')">ยืนยัน</button>
                                <button class="btn-done" onclick="updateStatus('${data.id}', 'เสร็จสิ้น')">ตรวจเสร็จ</button>
                            </div>
                            <div>
                                <button class="btn-cancel" onclick="updateStatus('${data.id}', 'ยกเลิก')">ยกเลิกคิว</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById("filterStatus").addEventListener("change", renderTable);

        // --- ส่วนจัดการวันหยุด (Closed Dates) ---
        document.getElementById("holidayInput").addEventListener("change", (e) => {
            const dateStr = e.target.value;
            const periodSelect = document.getElementById("holidayPeriod");
            if(!dateStr) {
                periodSelect.style.display = "none";
                return;
            }
            const dateObj = new Date(dateStr);
            const day = dateObj.getDay();
            
            if(day === 0 || day === 6) { 
                periodSelect.style.display = "inline-block";
                periodSelect.value = "all";
            } else { 
                periodSelect.style.display = "none";
                periodSelect.value = "all"; 
            }
        });

        window.addHoliday = async () => {
            const dateInput = document.getElementById("holidayInput").value;
            const periodInput = document.getElementById("holidayPeriod").value;

            if (!dateInput) {
                alert("กรุณาเลือกวันที่ต้องการตั้งเป็นวันหยุด");
                return;
            }

            if (allClosedDates.some(d => d.date === dateInput)) {
                alert("วันที่นี้มีการตั้งค่าวันหยุดไว้แล้วครับ");
                return;
            }

            try {
                await addDoc(collection(db, "closedDates"), { date: dateInput, period: periodInput });
                document.getElementById("holidayInput").value = ""; 
                document.getElementById("holidayPeriod").style.display = "none";
            } catch (error) {
                console.error("Error adding holiday:", error);
            }
        };

        window.removeHoliday = async (id) => {
            if (confirm("ต้องการลบวันหยุดนี้ และเปิดให้จองคิวตามปกติใช่หรือไม่?")) {
                await deleteDoc(doc(db, "closedDates", id));
            }
        };

        function renderHolidays() {
            const listEl = document.getElementById("holidayList");
            listEl.innerHTML = "";
            
            if (allClosedDates.length === 0) {
                listEl.innerHTML = "<div style='color: #aaa; font-size: 13px;'>ยังไม่มีการตั้งค่าว้นหยุดคลินิก</div>";
                return;
            }

            const periodTextMap = {
                "all": "ปิดทั้งวัน",
                "morning": "ปิดเฉพาะช่วงเช้า (08.30 - 12.00)",
                "evening": "ปิดเฉพาะช่วงเย็น (17.00 - 20.00)"
            };

            allClosedDates.forEach(item => {
                const [y, m, d] = item.date.split('-');
                const displayDate = `${d}/${m}/${y}`;
                const pText = periodTextMap[item.period || "all"];

                listEl.innerHTML += `
                    <div class="holiday-item">
                        <div>
                            <span>วันที่ปิด: <strong>${displayDate}</strong></span><br>
                            <span style="font-size: 12px; color: #d35400;">* ${pText}</span>
                        </div>
                        <button class="btn-cancel-sm" onclick="removeHoliday('${item.id}')">ลบ</button>
                    </div>
                `;
            });
        }

        // --- Init System ---
        async function initAdmin() {
            await liff.init({ liffId: "2009872099-Lm3zmKkH" });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            // โหลดภาพปัจจุบัน
            loadScheduleImage();

            const qAppointments = query(collection(db, "appointments"), orderBy("createdAt", "desc"));
            onSnapshot(qAppointments, (snapshot) => {
                allAppointments = [];
                snapshot.forEach((doc) => {
                    allAppointments.push({ id: doc.id, ...doc.data() });
                });
                renderTable(); 
            });

            const qClosed = query(collection(db, "closedDates"), orderBy("date", "asc"));
            onSnapshot(qClosed, (snapshot) => {
                allClosedDates = [];
                snapshot.forEach((doc) => {
                    allClosedDates.push({ id: doc.id, ...doc.data() });
                });
                renderHolidays();
            });
        }
        
        initAdmin();
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; background: #FAF9F6; padding: 20px; margin: 0; color: #4a4a4a; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .table-card { overflow-x: auto; }
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #F0ECE3; padding-bottom: 15px; margin-bottom: 15px; }
        h1, h2 { color: #8c7a6b; margin: 0;}
        h1 { font-size: 22px; }
        h2 { font-size: 18px; border-bottom: 2px solid #F0ECE3; padding-bottom: 10px; margin-bottom: 15px;}
        
        input[type="date"], select, input[type="file"] {
            padding: 8px 12px; border-radius: 6px; border: 1px solid #e0dcd3;
            font-family: 'Prompt'; font-size: 14px; outline: none; background-color: #faf9f7; color: #4a4a4a;
        }
        input[type="date"]:focus, select:focus { border-color: #8c7a6b; }

        .holiday-setup { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;}
        .holiday-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
        .holiday-item { background: #fdfaf8; border: 1px solid #e0dcd3; padding: 10px 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #F0ECE3; color: #8c7a6b; font-size: 15px; }
        td { padding: 12px; border-bottom: 1px solid #F0ECE3; font-size: 14px; vertical-align: top; }
        
        .status-รอยืนยัน { color: #E67E22; background: #FEF5E7; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        .status-ยืนยันแล้ว { color: #27AE60; background: #E9F7EF; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        .status-เสร็จสิ้น { color: #2980B9; background: #EAF2F8; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        .status-ยกเลิก { color: #C0392B; background: #FDEDEC; padding: 4px 8px; border-radius: 4px; font-weight: 500; font-size: 13px;}
        
        button { background: #8c7a6b; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: 'Prompt'; font-size: 13px; transition: 0.3s; }
        button:hover { background: #6b5b4c; }
        
        .btn-done { background: #3498DB; margin-left: 5px; }
        .btn-done:hover { background: #2980B9; }
        .btn-cancel { background: #E0E0E0; color: #666; margin-top: 5px; width: 100%;}
        .btn-cancel:hover { background: #ccc; }
        .btn-cancel-sm { background: #E0E0E0; color: #C0392B; padding: 4px 10px; font-size: 12px; }
        .btn-cancel-sm:hover { background: #C0392B; color: white; }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="card">
            <h2>🖼️ จัดการภาพตารางออกตรวจ</h2>
            <div class="holiday-setup">
                <input type="file" id="scheduleImage" accept="image/*">
                <button onclick="uploadSchedule()" id="uploadBtn">อัปโหลดภาพใหม่</button>
            </div>
            <div style="margin-top: 15px; padding: 15px; background: #faf9f7; border-radius: 8px; border: 1px dashed #e0dcd3; text-align: center;">
                <p style="font-size: 14px; margin-top: 0; color: #6b5b4c;">ภาพตารางปัจจุบัน (ที่จะแสดงให้ลูกค้าเห็น)</p>
                <div id="noImageText" style="color: #aaa; font-size: 13px;">ยังไม่มีการอัปโหลดภาพ</div>
                <img id="currentScheduleImg" src="" style="max-width: 100%; max-height: 300px; display: none; border-radius: 8px; margin: 0 auto;">
            </div>
        </div>

        <div class="card">
            <h2>🛑 ตั้งค่าวันหยุดคลินิก (ปิดรับจองคิว)</h2>
            <div class="holiday-setup">
                <label style="font-size: 14px;">เลือกวันที่ต้องการปิด:</label>
                <input type="date" id="holidayInput">
                <select id="holidayPeriod" style="display: none;">
                    <option value="all">ปิดทั้งวัน</option>
                    <option value="morning">ปิดเฉพาะช่วงเช้า (08.30 - 12.00)</option>
                    <option value="evening">ปิดเฉพาะช่วงเย็น (17.00 - 20.00)</option>
                </select>
                <button onclick="addHoliday()">+ เพิ่มวันหยุด</button>
            </div>
            <div id="holidayList" class="holiday-grid">
                <div style='color: #888; font-size: 13px;'>กำลังโหลดข้อมูลวันหยุด...</div>
            </div>
        </div>

        <div class="card table-card">
            <div class="header-container">
                <h1>🗓️ ระบบจัดการคิวนัดหมาย - CardioPlus</h1>
                <div class="filter-box">
                    <label style="font-size: 14px;">📌 แสดงผล: </label>
                    <select id="filterStatus">
                        <option value="active" selected>คิวปัจจุบัน (รอ / ยืนยัน)</option>
                        <option value="history">ประวัติย้อนหลัง (เสร็จสิ้น / ยกเลิก)</option>
                        <option value="all">ดูทั้งหมด</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ข้อมูลคนไข้</th>
                        <th>บริการที่จอง</th>
                        <th>วัน/เวลานัดหมาย</th>
                        <th>สถานะ</th>
                        <th style="width: 150px;">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="bookingList">
                    <tr><td colspan="5" style="text-align: center; color: #888; padding: 20px;">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
